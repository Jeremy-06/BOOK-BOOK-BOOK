<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register Account</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
    />

    <style>
      body {
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .register-card {
        background: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 450px;
      }
      .register-card h2 {
        font-weight: 700;
        color: #333;
        margin-bottom: 30px;
        text-align: center;
      }
      .form-control {
        padding: 12px 15px;
        border-radius: 8px;
        border: 1px solid #ddd;
        margin-bottom: 20px;
      }
      .form-control:focus {
        border-color: #007bff;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
      }
      .btn-primary {
        background: #007bff;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-weight: 600;
        width: 100%;
        transition: background 0.3s ease;
      }
      .btn-primary:hover {
        background: #0056b3;
      }
      .login-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #666;
        text-decoration: none;
      }
      .login-link:hover {
        color: #007bff;
      }
    </style>
  </head>

  <body>
    <div class="register-card">
      <h2>Create an Account</h2>
      <form id="registerForm">
        <div class="row">
          <div class="col-md-6">
            <label for="firstName" class="form-label fw-bold">First Name</label>
            <input
              type="text"
              id="firstName"
              name="first_name"
              class="form-control"
              placeholder="John"
              required
            />
          </div>
          <div class="col-md-6">
            <label for="lastName" class="form-label fw-bold">Last Name</label>
            <input
              type="text"
              id="lastName"
              name="last_name"
              class="form-control"
              placeholder="Doe"
              required
            />
          </div>
        </div>

        <div>
          <label for="email" class="form-label fw-bold">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-control"
            placeholder="name@example.com"
            required
          />
        </div>

        <div>
          <label for="password" class="form-label fw-bold">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            placeholder="••••••••"
            required
          />
        </div>

        <div>
          <label for="confirmPassword" class="form-label fw-bold"
            >Confirm Password</label
          >
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            class="form-control"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary mt-2" id="registerBtn">
          Register Now
        </button>
      </form>
      <a href="login.html" class="login-link"
        >Already have an account? Log in here.</a
      >
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="js/user.js"></script>
  </body>
</html>
