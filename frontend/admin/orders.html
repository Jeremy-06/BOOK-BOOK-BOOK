<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Manage Orders</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      href="https://use.fontawesome.com/releases/v5.0.6/css/all.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
    />

    <style>
      body {
        background-color: #f4f6f9;
        overflow-x: hidden;
      }
      .sidebar {
        height: 100vh;
        background-color: #343a40;
        padding-top: 20px;
        color: white;
        position: fixed;
        width: 250px;
      }
      .sidebar a {
        color: #c2c7d0;
        padding: 15px 20px;
        display: block;
        text-decoration: none;
        font-weight: 500;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background-color: #007bff;
        color: white;
      }
      .main-content {
        margin-left: 250px;
        padding: 30px;
      }
      .card-custom {
        border: none;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }
      .custom-table-scroll {
        height: calc(100vh - 220px);
        min-height: 400px;
        overflow-y: auto;
        width: 100%;
      }
      .custom-table-scroll thead th {
        position: sticky;
        top: 0;
        z-index: 2;
      }
      .sortable {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center mb-4">
        <i class="fas fa-book-open"></i> Admin Panel
      </h4>
      <a href="dashboard.html"
        ><i class="fas fa-chart-line me-2"></i> Dashboard</a
      >
      <a href="books.html"><i class="fas fa-book me-2"></i> Manage Books</a>
      <a href="categories.html"
        ><i class="fas fa-tags me-2"></i> Manage Categories</a
      >
      <a href="users.html"><i class="fas fa-users me-2"></i> Manage Users</a>
      <a href="orders.html" class="active"
        ><i class="fas fa-shopping-cart me-2"></i> Manage Orders</a
      >
      <a href="../home.html" class="mt-5"
        ><i class="fas fa-store me-2"></i> Back to Shop</a
      >
    </div>

    <div class="main-content">
      <h2 class="mb-4">Order Management</h2>

      <div class="card card-custom p-4">
        <input
          type="text"
          class="form-control admin-search mb-3"
          placeholder="Search..."
        />
        <div
          id="ordersTableContainer"
          class="table-responsive custom-table-scroll"
          style="
            height: calc(100vh - 220px);
            min-height: 400px;
            overflow-y: auto;
          "
        >
          <table
            id="ordersTable"
            class="table table-striped table-hover align-middle w-100 mb-0"
          >
            <thead class="table-dark">
              <tr>
                <th class="sortable" data-sort="id">Order ID</th>
                <th>Customer</th>
                <th class="sortable" data-sort="date_placed">Date Placed</th>
                <th>Total Items</th>
                <th>Total Price</th>
                <th class="sortable" data-sort="status">Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="modal fade" id="orderModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">
              Order Details (ID: <span id="modalOrderId"></span>)
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <strong>Customer:</strong> <span id="modalCustomer"></span><br />
              <strong>Email:</strong> <span id="modalEmail"></span>
            </div>

            <table class="table table-bordered">
              <thead class="table-light">
                <tr>
                  <th>Book Title</th>
                  <th>Quantity</th>
                  <th>Price</th>
                  <th>Subtotal</th>
                </tr>
              </thead>
              <tbody id="modalItemsBody"></tbody>
              <tfoot>
                <tr>
                  <th colspan="3" class="text-end">Shipping Fee:</th>
                  <th id="modalShipping">₱100.00</th>
                </tr>
                <tr>
                  <th colspan="3" class="text-end">Grand Total:</th>
                  <th id="modalGrandTotal"></th>
                </tr>
              </tfoot>
            </table>

            <div class="mt-3">
              <label class="form-label fw-bold">Update Status:</label>
              <div class="input-group">
                <select id="updateStatusSelect" class="form-select">
                  <option value="Processing">Processing</option>
                  <option value="Shipped">Shipped</option>
                  <option value="Delivered">Delivered</option>
                  <option value="Cancelled">Cancelled</option>
                </select>
                <button class="btn btn-success" id="saveStatusBtn">
                  Update
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>

    <script src="../js/admin-orders.js"></script>
  </body>
</html>
