<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Manage Categories</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      href="https://use.fontawesome.com/releases/v5.0.6/css/all.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css"
    />

    <style>
      body {
        background-color: #f4f6f9;
        overflow-x: hidden;
      }
      .sidebar {
        height: 100vh;
        background-color: #343a40;
        padding-top: 20px;
        color: white;
        position: fixed;
        width: 250px;
      }
      .sidebar a {
        color: #c2c7d0;
        padding: 15px 20px;
        display: block;
        text-decoration: none;
        font-weight: 500;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background-color: #007bff;
        color: white;
      }
      .main-content {
        margin-left: 250px;
        padding: 30px;
      }
      .card-custom {
        border: none;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center mb-4">
        <i class="fas fa-book-open"></i> Admin Panel
      </h4>
      <a href="dashboard.html"
        ><i class="fas fa-chart-line me-2"></i> Dashboard</a
      >
      <a href="books.html"><i class="fas fa-book me-2"></i> Manage Books</a>
      <a href="categories.html" class="active"
        ><i class="fas fa-tags me-2"></i> Manage Categories</a
      >
      <a href="users.html"><i class="fas fa-users me-2"></i> Manage Users</a>
      <a href="orders.html"
        ><i class="fas fa-shopping-cart me-2"></i> Manage Orders</a
      >
      <a href="../home.html" class="mt-5"
        ><i class="fas fa-store me-2"></i> Back to Shop</a
      >
    </div>

    <div class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Category Management</h2>
        <button
          id="addCategoryBtn"
          type="button"
          class="btn btn-primary btn-sm"
        >
          <i class="fas fa-plus me-1"></i> Add Category
        </button>
      </div>

      <div class="card card-custom p-4">
        <div id="categoriesTableContainer" class="table-responsive">
          <table
            id="categoriesTable"
            class="table table-striped table-hover align-middle w-100 mb-0"
          >
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="modal fade" id="categoryModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Category Details</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="categoryForm" novalidate>
              <input type="hidden" id="categoryId" name="category_id" />
              <div class="mb-3">
                <label class="form-label">Name</label>
                <input
                  type="text"
                  class="form-control required-field"
                  id="categoryName"
                  name="name"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea
                  class="form-control"
                  id="categoryDescription"
                  name="description"
                  rows="4"
                ></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button
              id="categorySubmit"
              type="submit"
              form="categoryForm"
              class="btn btn-primary"
            >
              Save Category
            </button>
            <button
              id="categoryUpdate"
              type="submit"
              form="categoryForm"
              class="btn btn-success"
            >
              Update Category
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="../js/admin-categories.js"></script>
  </body>
</html>
