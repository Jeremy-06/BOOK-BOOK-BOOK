<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Dashboard</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      href="https://use.fontawesome.com/releases/v5.0.6/css/all.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
    />

    <style>
      body {
        background-color: #f4f6f9;
        overflow-x: hidden;
      }
      .sidebar {
        height: 100vh;
        background-color: #343a40;
        padding-top: 20px;
        color: white;
        position: fixed;
        width: 250px;
      }
      .sidebar a {
        color: #c2c7d0;
        padding: 15px 20px;
        display: block;
        text-decoration: none;
        font-weight: 500;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background-color: #007bff;
        color: white;
      }
      .main-content {
        margin-left: 250px;
        padding: 30px;
      }
      .card-custom {
        border: none;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }
      .chart-box {
        height: 360px;
      }
      .chart-box canvas {
        max-height: 300px;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center mb-4">
        <i class="fas fa-book-open"></i> Admin Panel
      </h4>
      <a href="dashboard.html" class="active"
        ><i class="fas fa-chart-line me-2"></i> Dashboard</a
      >
      <a href="books.html"><i class="fas fa-book me-2"></i> Manage Books</a>
      <a href="categories.html"
        ><i class="fas fa-tags me-2"></i> Manage Categories</a
      >
      <a href="users.html"><i class="fas fa-users me-2"></i> Manage Users</a>
      <a href="orders.html"
        ><i class="fas fa-shopping-cart me-2"></i> Manage Orders</a
      >
      <a href="../home.html" class="mt-5"
        ><i class="fas fa-store me-2"></i> Back to Shop</a
      >
    </div>

    <div class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Dashboard Charts</h2>
      </div>

      <div class="card card-custom p-4 mb-4">
        <div class="row g-3 align-items-end">
          <div class="col-md-4">
            <label for="startDate" class="form-label">Start Date</label>
            <input type="date" id="startDate" class="form-control" />
          </div>
          <div class="col-md-4">
            <label for="endDate" class="form-label">End Date</label>
            <input type="date" id="endDate" class="form-control" />
          </div>
          <div class="col-md-4">
            <button id="filterBtn" type="button" class="btn btn-primary w-100">
              <i class="fas fa-filter me-1"></i> Filter
            </button>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-lg-8">
          <div class="card card-custom p-4 chart-box">
            <h5 class="mb-3">Revenue</h5>
            <canvas id="revenueChart"></canvas>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card card-custom p-4 chart-box">
            <h5 class="mb-3">Order Statuses</h5>
            <canvas id="orderStatusChart"></canvas>
          </div>
        </div>
        <div class="col-12">
          <div class="card card-custom p-4 chart-box">
            <h5 class="mb-3">Top Books</h5>
            <canvas id="topBooksChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/admin-dashboard.js"></script>
  </body>
</html>
