<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Manage Users</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      href="https://use.fontawesome.com/releases/v5.0.6/css/all.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
    />

    <style>
      body {
        background-color: #f4f6f9;
        overflow-x: hidden;
      }
      .sidebar {
        height: 100vh;
        background-color: #343a40;
        padding-top: 20px;
        color: white;
        position: fixed;
        width: 250px;
      }
      .sidebar a {
        color: #c2c7d0;
        padding: 15px 20px;
        display: block;
        text-decoration: none;
        font-weight: 500;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background-color: #007bff;
        color: white;
      }
      .main-content {
        margin-left: 250px;
        padding: 30px;
      }
      .card-custom {
        border: none;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }
      .custom-table-scroll {
        height: calc(100vh - 220px);
        min-height: 400px;
        overflow-y: auto;
        width: 100%;
      }
      .custom-table-scroll thead th {
        position: sticky;
        top: 0;
        z-index: 2;
      }
      .sortable {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center mb-4">
        <i class="fas fa-book-open"></i> Admin Panel
      </h4>
      <a href="books.html"><i class="fas fa-boxes me-2"></i> Manage Books</a>
      <a href="users.html" class="active"
        ><i class="fas fa-users me-2"></i> Manage Users</a
      >
      <a href="orders.html"
        ><i class="fas fa-shopping-cart me-2"></i> Manage Orders</a
      >
      <a href="../home.html" class="mt-5"
        ><i class="fas fa-store me-2"></i> Back to Shop</a
      >
    </div>

    <div class="main-content">
      <h2 class="mb-4">User Management</h2>

      <div class="card card-custom p-4">
        <div
          id="usersTableContainer"
          class="table-responsive custom-table-scroll"
          style="height: calc(100vh - 220px); min-height: 400px; overflow-y: auto;"
        >
          <table
            id="usersTable"
            class="table table-striped table-hover align-middle w-100 mb-0"
          >
            <thead class="table-dark">
              <tr>
                <th class="sortable" data-sort="id">ID</th>
                <th class="sortable" data-sort="first_name">Name</th>
                <th class="sortable" data-sort="email">Email</th>
                <th class="sortable" data-sort="role">Role</th>
                <th class="sortable" data-sort="deleted_at">Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="modal fade" id="roleModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Change User Role</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="editUserId" />
            <div class="mb-3">
              <label class="form-label">Select Role</label>
              <select id="userRole" class="form-select">
                <option value="user">Normal User</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button type="button" class="btn btn-primary" id="saveRoleBtn">
              Save Changes
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="reactivateModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-success text-white">
            <h5 class="modal-title">Reactivate User</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="reactivateUserEmail" />
            <p class="mb-0">Are you sure you want to reactivate this user?</p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-success"
              id="confirmReactivateBtn"
            >
              OK
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>

    <script src="../js/admin-users.js"></script>
  </body>
</html>
