<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      href="https://use.fontawesome.com/releases/v5.0.6/css/all.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(180deg, #f7f7fb 0%, #eef2f7 100%);
        min-height: 100vh;
      }
      .profile-shell {
        max-width: 980px;
      }
      .hero-card {
        background: linear-gradient(135deg, #1d2433 0%, #3b5f41 100%);
        color: white;
        border-radius: 28px;
      }
      .info-card {
        border: 0;
        border-radius: 20px;
        box-shadow: 0 14px 30px rgba(29, 36, 51, 0.08);
      }
      .avatar {
        width: 120px;
        height: 120px;
        object-fit: cover;
        border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.25);
      }
      .label {
        font-size: 0.82rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="container py-5 profile-shell">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h1 class="h3 mb-1">My Profile</h1>
          <p class="text-muted mb-0">
            View your account details and shipping information.
          </p>
        </div>
        <a href="home.html" class="btn btn-outline-dark"
          ><i class="fas fa-arrow-left me-1"></i>Back Home</a
        >
      </div>

      <div class="hero-card p-4 p-lg-5 mb-4">
        <div class="d-flex flex-column flex-md-row gap-4 align-items-md-center">
          <img
            id="profileAvatar"
            src="https://via.placeholder.com/200?text=Profile"
            class="avatar"
            alt="Profile avatar"
          />
          <div>
            <p class="mb-1 text-uppercase small opacity-75">Logged in user</p>
            <h2 class="mb-2" id="profileName">Loading...</h2>
            <p class="mb-0 opacity-75" id="profileEmail">-</p>
          </div>
        </div>
      </div>

      <div class="card info-card p-4">
        <div class="row g-4">
          <div class="col-md-6">
            <div class="label mb-1">First Name</div>
            <div class="fw-semibold fs-5" id="profileFirstName">-</div>
          </div>
          <div class="col-md-6">
            <div class="label mb-1">Last Name</div>
            <div class="fw-semibold fs-5" id="profileLastName">-</div>
          </div>
          <div class="col-md-6">
            <div class="label mb-1">Phone</div>
            <div class="fw-semibold fs-5" id="profilePhone">-</div>
          </div>
          <div class="col-md-6">
            <div class="label mb-1">ZIP Code</div>
            <div class="fw-semibold fs-5" id="profileZipcode">-</div>
          </div>
          <div class="col-12">
            <div class="label mb-1">Address</div>
            <div class="fw-semibold fs-5" id="profileAddress">-</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
