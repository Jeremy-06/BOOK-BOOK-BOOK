<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Manage Books</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css"
    />
    <link
      href="https://use.fontawesome.com/releases/v5.0.6/css/all.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.datatables.net/buttons/2.3.5/css/buttons.dataTables.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.css"
    />

    <style>
      body {
        background-color: #f4f6f9;
        overflow-x: hidden;
      }
      .sidebar {
        height: 100vh;
        background-color: #343a40;
        padding-top: 20px;
        color: white;
        position: fixed;
        width: 250px;
      }
      .sidebar a {
        color: #c2c7d0;
        padding: 15px 20px;
        display: block;
        text-decoration: none;
        font-weight: 500;
      }
      .sidebar a:hover,
      .sidebar a.active {
        background-color: #007bff;
        color: white;
      }
      .main-content {
        margin-left: 250px;
        padding: 30px;
      }
      .card-custom {
        border: none;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h4 class="text-center mb-4">
        <i class="fas fa-book-open"></i> Admin Panel
      </h4>
      <a href="books.html" class="active"
        ><i class="fas fa-boxes me-2"></i> Manage Books</a
      >
      <a href="users.html"><i class="fas fa-users me-2"></i> Manage Users</a>
      <a href="../home.html" class="mt-5"
        ><i class="fas fa-store me-2"></i> Back to Shop</a
      >
    </div>

    <div class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Inventory Management</h2>
      </div>

      <div class="card card-custom p-4">
        <div class="table-responsive">
          <table
            id="btable"
            class="table table-striped table-hover align-middle"
          >
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Cover</th>
                <th>Title</th>
                <th>Author</th>
                <th>Price</th>
                <th>ISBN</th>
                <th>Quantity</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="bbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="modal fade" id="bookModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Book Details</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="bform">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label">Title</label>
                  <input
                    type="text"
                    class="form-control"
                    id="title"
                    name="title"
                    required
                  />
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label">Author</label>
                  <input
                    type="text"
                    class="form-control"
                    id="author"
                    name="author"
                    required
                  />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea
                  class="form-control"
                  id="desc"
                  name="description"
                  rows="3"
                ></textarea>
              </div>
              <div class="row">
                <div class="col-md-4 mb-3">
                  <label class="form-label">Price (₱)</label>
                  <input
                    type="number"
                    step="0.01"
                    class="form-control"
                    id="price"
                    name="price"
                    required
                  />
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">ISBN</label>
                  <input
                    type="text"
                    class="form-control"
                    id="isbn"
                    name="isbn"
                    required
                  />
                </div>
                <div class="col-md-4 mb-3">
                  <label class="form-label">Quantity</label>
                  <input
                    type="number"
                    class="form-control"
                    id="qty"
                    name="quantity"
                    required
                  />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Cover Image</label>
                <input
                  type="file"
                  class="form-control"
                  id="img"
                  name="images"
                  multiple
                />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
            <button id="bookSubmit" type="button" class="btn btn-primary">
              Save Book
            </button>
            <button id="bookUpdate" type="button" class="btn btn-success">
              Update Book
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/datatables/1.10.21/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.22/js/dataTables.bootstrap5.min.js"></script>

    <script src="https://cdn.datatables.net/buttons/1.6.5/js/dataTables.buttons.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.3/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
    <script src="https://cdn.datatables.net/buttons/1.6.5/js/buttons.html5.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.16.1/sweetalert2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootbox.js/5.5.2/bootbox.min.js"></script>

    <script src="../js/admin-books.js"></script>
  </body>
</html>
